<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Streamix — Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#07080c;color:#fff;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center}
    .logo{font-size:24px;font-weight:900;color:#14b8a6;letter-spacing:-0.02em}
    .icon{font-size:64px;margin-bottom:8px}
    h1{font-size:22px;font-weight:700}
    p{color:#64748b;font-size:14px;max-width:320px;line-height:1.6}
    .btn{margin-top:8px;padding:12px 28px;background:#14b8a6;color:#07080c;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
    .btn:active{transform:scale(0.97)}
  </style>
</head>
<body>
  <div class="logo">STREAMIX</div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>Check your connection. Your downloads are still available — go back to browse them.</p>
  <button class="btn" onclick="window.location.href='/downloads'">View Downloads</button>
  <button class="btn" style="background:transparent;color:#64748b;border:1px solid #1e2235" onclick="window.location.reload()">Retry</button>
</body>
</html>
